# Template — DO NOT commit real credentials.
# Create the real secret with:
#   kubectl -n minio create secret generic minio-secrets \
#     --from-literal=MINIO_ROOT_USER='admin' \
#     --from-literal=MINIO_ROOT_PASSWORD='<long-random-password>'
apiVersion: v1
kind: Secret
metadata:
  name: minio-secrets
  namespace: minio
type: Opaque
stringData:
  MINIO_ROOT_USER: REPLACE_ME
  MINIO_ROOT_PASSWORD: REPLACE_ME
