apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-vault-api
  namespace: vault
spec:
  stripPrefix:
    prefixes:
      - /vault/api
---
# Backend ingress: /vault/api/* → vault-backend (strip /vault/api → backend sees /*)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-api
  namespace: vault
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: vault-strip-vault-api@kubernetescrd
spec:
  rules:
    - http:
        paths:
          - path: /vault/api
            pathType: Prefix
            backend:
              service:
                name: vault-backend
                port:
                  number: 8000
---
# Frontend ingress: /vault/* → vault-frontend (no strip — Next.js basePath handles it)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-web
  namespace: vault
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /vault
            pathType: Prefix
            backend:
              service:
                name: vault-frontend
                port:
                  number: 3000
