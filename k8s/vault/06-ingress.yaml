apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: vault
spec:
  stripPrefix:
    prefixes:
      - /api
---
# Backend ingress: /api/* → vault-backend with strip-prefix middleware
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-api
  namespace: vault
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: vault-strip-api@kubernetescrd
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vault-backend
                port:
                  number: 8000
---
# Frontend ingress: /* → vault-frontend (no middleware)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-web
  namespace: vault
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault-frontend
                port:
                  number: 3000
