apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-backend
  namespace: vault
  labels:
    app: vault-backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vault-backend
  template:
    metadata:
      labels:
        app: vault-backend
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: backend
          image: ghcr.io/yakshith15/vault-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: vault-config
            - secretRef:
                name: vault-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vault-data
---
apiVersion: v1
kind: Service
metadata:
  name: vault-backend
  namespace: vault
spec:
  type: ClusterIP
  selector:
    app: vault-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
