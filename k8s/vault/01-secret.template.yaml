# Template only — DO NOT fill in the real key here and commit it.
# Create the real secret directly on the cluster (see k8s/vault/README.md):
#
#   kubectl -n vault create secret generic vault-secrets \
#     --from-literal=GEMINI_API_KEY='<your-real-key>'
#
apiVersion: v1
kind: Secret
metadata:
  name: vault-secrets
  namespace: vault
type: Opaque
stringData:
  GEMINI_API_KEY: "REPLACE_ME"
