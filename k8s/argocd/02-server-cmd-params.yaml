apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # Run argocd-server in --insecure mode (no internal TLS).
  # Reason: we expose it over plain HTTP via LoadBalancer on the tailnet.
  # Tailscale already encrypts traffic between devices, so no value in
  # double-encrypting inside the cluster.
  server.insecure: "true"
